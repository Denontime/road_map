<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>骑行路书生成器</title>
    <style>
        :root {
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --bg-tertiary: #f1f5f9;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --text-muted: #94a3b8;
            --border-color: #e2e8f0;
            --accent-color: #3b82f6;
            --accent-hover: #2563eb;
            --accent-light: #eff6ff;
            --success-color: #10b981;
            --warning-color: #8b5cf6;
            --shadow: rgba(0,0,0,0.1);
        }
        [data-theme="dark"] {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-tertiary: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border-color: #334155;
            --accent-light: #1e3a5f;
            --shadow: rgba(0,0,0,0.3);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-primary);
            min-height: 100vh;
            padding: 20px;
            transition: background 0.3s, color 0.3s;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: var(--bg-secondary);
            border-radius: 16px;
            box-shadow: 0 20px 60px var(--shadow);
            overflow: hidden;
            transition: background 0.3s;
        }
        .header {
            background: linear-gradient(135deg, var(--accent-color) 0%, #6366f1 100%);
            color: white;
            padding: 30px;
            text-align: center;
            position: relative;
        }
        .theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s;
        }
        .theme-toggle:hover {
            background: rgba(255,255,255,0.3);
        }
        .header h1 { font-size: 28px; margin-bottom: 10px; }
        .header p { opacity: 0.9; }
        .form-section {
            padding: 30px;
        }
        .form-group {
            margin-bottom: 25px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
            font-size: 16px;
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            font-size: 16px;
            background: var(--bg-secondary);
            color: var(--text-primary);
            transition: border-color 0.3s, background 0.3s, color 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--accent-color);
        }
        .form-group .hint {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 5px;
        }
        .waypoint-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        .waypoint-row input {
            flex: 1;
        }
        .waypoint-row button {
            padding: 14px 20px;
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
        }
        .waypoint-row button:hover {
            background: #dc2626;
        }
        .add-waypoint {
            background: var(--bg-tertiary);
            border: 2px dashed var(--border-color);
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.3s;
        }
        .add-waypoint:hover {
            border-color: var(--accent-color);
            color: var(--accent-color);
        }
        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }
        .btn {
            flex: 1;
            padding: 16px 24px;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--accent-color) 0%, #6366f1 100%);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4);
        }
        .btn-secondary {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }
        .btn-secondary:hover {
            background: var(--border-color);
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .loading {
            text-align: center;
            padding: 40px;
            display: none;
        }
        .loading.show { display: block; }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid var(--bg-tertiary);
            border-top: 4px solid var(--accent-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .result-section {
            display: none;
            border-top: 1px solid var(--border-color);
            padding: 30px;
            background: var(--bg-secondary);
        }
        .result-section.show { display: block; }
        .result-preview {
            background: var(--bg-tertiary);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            max-height: 400px;
            overflow-y: auto;
        }
        .result-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        .stat-box {
            background: var(--bg-tertiary);
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid var(--border-color);
        }
        .stat-value { font-size: 24px; font-weight: bold; color: var(--accent-color); }
        .stat-label { font-size: 14px; color: var(--text-secondary); margin-top: 5px; }
        .result-actions {
            display: flex;
            gap: 15px;
        }
        .error-msg {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #dc2626;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        [data-theme="dark"] .error-msg {
            background: #450a0a;
            border-color: #7f1d1d;
            color: #fca5a5;
        }
        .history-section {
            border-top: 1px solid var(--border-color);
            padding: 30px;
            background: var(--bg-tertiary);
        }
        .history-section h3 {
            margin-bottom: 15px;
            color: var(--text-primary);
        }
        .history-list {
            display: grid;
            gap: 10px;
        }
        .history-item {
            background: var(--bg-secondary);
            padding: 15px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid var(--border-color);
        }
        .history-item:hover {
            box-shadow: 0 4px 12px var(--shadow);
        }
        .history-item-name { font-weight: 600; color: var(--text-primary); }
        .history-item-date { font-size: 13px; color: var(--text-muted); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <button class="theme-toggle" id="themeToggle" title="切换主题">🌙</button>
            <h1>🗺️ 路书生成器</h1>
            <p>输入起点、终点和途经点，自动生成路书</p>
        </div>

        <div class="form-section">
            <div class="error-msg" id="errorMsg"></div>

            <div class="form-group">
                <label>起点地址</label>
                <input type="text" id="origin" placeholder="例如：银川市吾悦广场">
                <p class="hint">输入骑行的出发点地址</p>
            </div>

            <div class="form-group">
                <label>终点地址</label>
                <input type="text" id="destination" placeholder="例如：贺兰山岩画">
                <p class="hint">输入骑行的目的地地址</p>
            </div>

            <div class="form-group">
                <label>交通工具</label>
                <div style="display: flex; gap: 15px; margin-top: 10px;">
                    <label class="vehicle-option selected" style="flex: 1; cursor: pointer;">
                        <input type="radio" name="vehicle" value="motorcycle" checked style="display: none;">
                        <div class="vehicle-card" style="padding: 20px; border: 2px solid var(--accent-color); border-radius: 8px; text-align: center; background: var(--accent-light);">
                            <div style="font-size: 30px;">🏍️ 🚗</div>
                            <div style="margin-top: 8px; font-weight: 600; color: var(--text-primary);">摩托车/汽车</div>
                        </div>
                    </label>
                    <label class="vehicle-option" style="flex: 1; cursor: pointer;">
                        <input type="radio" name="vehicle" value="bicycle" style="display: none;">
                        <div class="vehicle-card" style="padding: 20px; border: 2px solid var(--border-color); border-radius: 8px; text-align: center; background: var(--bg-secondary);">
                            <div style="font-size: 30px;">🚴</div>
                            <div style="margin-top: 8px; font-weight: 600; color: var(--text-primary);">自行车</div>
                        </div>
                    </label>
                    <label class="vehicle-option" style="flex: 1; cursor: pointer;">
                        <input type="radio" name="vehicle" value="walking" style="display: none;">
                        <div class="vehicle-card" style="padding: 20px; border: 2px solid var(--border-color); border-radius: 8px; text-align: center; background: var(--bg-secondary);">
                            <div style="font-size: 30px;">🚶</div>
                            <div style="margin-top: 8px; font-weight: 600; color: var(--text-primary);">步行</div>
                        </div>
                    </label>
                </div>
                <p class="hint">选择出行方式</p>
            </div>

            <div class="form-group">
                <label>途经点（可选）</label>
                <div id="waypointList"></div>
                <div class="add-waypoint" id="addWaypoint" onclick="addWaypointField()">
                    + 添加途经点
                </div>
                <p class="hint">添加返程途经点，例如：服务区、休息点</p>
            </div>

            <div class="btn-group">
                <button class="btn btn-secondary" onclick="previewRoute()">👁️ 预览路书</button>
                <button class="btn btn-primary" onclick="generateRouteBook()">📚 生成路书</button>
            </div>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>正在规划路线，请稍候...</p>
        </div>

        <div class="result-section" id="resultSection">
            <h3 style="margin-bottom: 15px; color: var(--text-primary);">📊 路线规划结果</h3>
            <div class="result-stats" id="resultStats"></div>
            <div class="result-preview" id="resultPreview"></div>
            <div class="result-actions">
                <button class="btn btn-primary" onclick="downloadBook()">📥 下载路书</button>
                <button class="btn btn-secondary" onclick="openInAmap()">📍 在高德地图中查看</button>
            </div>
        </div>

        <div class="history-section">
            <h3>📁 已生成的路书</h3>
            <div class="history-list" id="historyList">
                <p style="color: var(--text-muted); text-align: center; padding: 20px;">暂无已生成的路书</p>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://127.0.0.1:5000';
        let waypointCount = 0;
        let currentRouteData = null;
        let currentOutputDir = null;

        const themeToggle = document.getElementById('themeToggle');
        const savedTheme = localStorage.getItem('theme') || 'light';
        if (savedTheme === 'dark') {
            document.body.setAttribute('data-theme', 'dark');
            themeToggle.textContent = '☀️';
        }

        themeToggle.addEventListener('click', () => {
            const isDark = document.body.getAttribute('data-theme') === 'dark';
            if (isDark) {
                document.body.removeAttribute('data-theme');
                themeToggle.textContent = '🌙';
                localStorage.setItem('theme', 'light');
            } else {
                document.body.setAttribute('data-theme', 'dark');
                themeToggle.textContent = '☀️';
                localStorage.setItem('theme', 'dark');
            }
        });

        function addWaypointField() {
            waypointCount++;
            const container = document.getElementById('waypointList');
            const row = document.createElement('div');
            row.className = 'waypoint-row';
            row.id = `waypoint-${waypointCount}`;
            row.innerHTML = `
                <input type="text" id="waypoint-input-${waypointCount}" placeholder="途经点地址">
                <button type="button" onclick="removeWaypoint(${waypointCount})">×</button>
            `;
            container.appendChild(row);
        }

        function removeWaypoint(id) {
            const row = document.getElementById(`waypoint-${id}`);
            if (row) row.remove();
        }

        function getWaypoints() {
            const waypoints = [];
            document.querySelectorAll('.waypoint-row input').forEach(input => {
                if (input.value.trim()) {
                    waypoints.push(input.value.trim());
                }
            });
            return waypoints;
        }

        function getSelectedVehicle() {
            const selected = document.querySelector('input[name="vehicle"]:checked');
            return selected ? selected.value : 'motorcycle';
        }

        function setupVehicleSelector() {
            const options = document.querySelectorAll('.vehicle-option');
            const accentColor = getComputedStyle(document.documentElement).getPropertyValue('--accent-color').trim();
            const accentLight = getComputedStyle(document.documentElement).getPropertyValue('--accent-light').trim();
            
            options.forEach(option => {
                const radio = option.querySelector('input[type="radio"]');
                const card = option.querySelector('.vehicle-card');
                
                option.addEventListener('click', () => {
                    options.forEach(opt => {
                        opt.querySelector('.vehicle-card').style.borderColor = 'var(--border-color)';
                        opt.querySelector('.vehicle-card').style.background = 'var(--bg-secondary)';
                    });
                    card.style.borderColor = 'var(--accent-color)';
                    card.style.background = 'var(--accent-light)';
                    radio.checked = true;
                });
            });
        }

        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.textContent = msg;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 5000);
        }

        function showLoading(show) {
            document.getElementById('loading').classList.toggle('show', show);
        }

        async function previewRoute() {
            const origin = document.getElementById('origin').value.trim();
            const destination = document.getElementById('destination').value.trim();
            const waypoints = getWaypoints();
            const vehicleType = getSelectedVehicle();

            if (!origin || !destination) {
                showError('请输入起点和终点地址');
                return;
            }

            showLoading(true);
            document.getElementById('resultSection').classList.remove('show');

            try {
                const response = await fetch(`${API_BASE}/api/route/book/preview`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ origin, destination, waypoints, return_via: waypoints, vehicle_type: vehicleType })
                });

                const result = await response.json();

                if (result.error) {
                    showError(result.error);
                    return;
                }

                currentRouteData = result.data;
                displayResult(result.data, result.html);
            } catch (err) {
                showError('请求失败：' + err.message);
            } finally {
                showLoading(false);
            }
        }

        async function generateRouteBook() {
            const origin = document.getElementById('origin').value.trim();
            const destination = document.getElementById('destination').value.trim();
            const waypoints = getWaypoints();
            const vehicleType = getSelectedVehicle();

            if (!origin || !destination) {
                showError('请输入起点和终点地址');
                return;
            }

            showLoading(true);

            try {
                const response = await fetch(`${API_BASE}/api/route/book`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ origin, destination, waypoints, return_via: waypoints, vehicle_type: vehicleType })
                });

                const result = await response.json();

                if (result.error) {
                    showError(result.error);
                    return;
                }

                currentOutputDir = result.output_dir;
                currentRouteData = result.data;
                displayResult(result.data, result.data ? '路书已生成！' : '路书生成完成');
                loadHistory();
                alert('路书已生成！文件保存在：\n' + result.output_dir);
            } catch (err) {
                showError('请求失败：' + err.message);
            } finally {
                showLoading(false);
            }
        }

        function displayResult(data, html) {
            const section = document.getElementById('resultSection');
            const stats = document.getElementById('resultStats');
            const preview = document.getElementById('resultPreview');

            const goRoute = data.go_route;
            const distance = (goRoute.total_distance / 1000).toFixed(1);
            const duration = Math.round(goRoute.total_duration / 60);
            const calories = Math.round(goRoute.total_distance / 1000 * 30);

            stats.innerHTML = `
                <div class="stat-box">
                    <div class="stat-value">${distance} km</div>
                    <div class="stat-label">总距离</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value">${duration} min</div>
                    <div class="stat-label">预计时间</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value">${calories} cal</div>
                    <div class="stat-label">消耗卡路里</div>
                </div>
            `;

            preview.innerHTML = html;
            section.classList.add('show');
        }

        function downloadBook() {
            if (currentOutputDir) {
                window.open(`${API_BASE}/output/${currentOutputDir.split(/[\\/]/).pop()}/route_book.html`);
            }
        }

        function openInAmap() {
            if (currentRouteData) {
                const origin = currentRouteData.origin;
                const destination = currentRouteData.destination;
                const url = `https://uri.amap.com/marker?position=${origin.location},${origin.formatted_address}&position=${destination.location},${destination.formatted_address}&src=riding&callnative=1`;
                window.open(url);
            }
        }

        async function loadHistory() {
            try {
                const response = await fetch(`${API_BASE}/api/output/list`);
                const list = await response.json();

                const container = document.getElementById('historyList');
                if (list.length === 0) {
                    container.innerHTML = '<p style="color: var(--text-muted); text-align: center; padding: 20px;">暂无已生成的路书</p>';
                    return;
                }

                container.innerHTML = list.map(item => `
                    <div class="history-item" onclick="openHistory('${item.name}')">
                        <div>
                            <div class="history-item-name">${item.name}</div>
                        </div>
                        <button class="btn btn-secondary" style="padding: 8px 16px; font-size: 14px;">查看</button>
                    </div>
                `).join('');
            } catch (err) {
                console.error('加载历史失败:', err);
            }
        }

        function openHistory(name) {
            window.open(`${API_BASE}/output/${name}/route_book.html`);
        }

        setupVehicleSelector();
        loadHistory();
    </script>
</body>
</html>
